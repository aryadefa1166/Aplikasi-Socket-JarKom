<!DOCTYPE html>
<html>
<head>
    <title>Chat Jarkom</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="chat-container">

    <div id="login">
        <h2>Masukkan Username</h2>
        <input id="usernameInput" placeholder="Username..." />
        <button onclick="joinChat()">Masuk</button>
    </div>

    <div id="chat" style="display:none;">
        <h2>Aplikasi Chat Socket.io</h2>

        <div class="user-list">
            <h4>User Online:</h4>
            <ul id="users"></ul>
        </div>

        <ul id="messages"></ul>

        <form id="form">
            <input id="input" autocomplete="off" placeholder="Ketik pesan..." />
            <button>Kirim</button>
        </form>
    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>

</body>
</html>
